<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Navbar</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            color: #fff;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            background: linear-gradient(90deg, #111, #222, #111);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
        }

        nav ul {
            list-style: none;
            display: flex;
            align-items: center;
            transition: all 0.5s ease;
        }

        /* Default: items on left */
        nav ul.left {
            justify-content: flex-start;
        }

        /* On about page: items in center */
        nav ul.center {
            justify-content: center;
        }

        nav ul li {
            margin: 0 20px;
            position: relative;
        }

        nav ul li a {
            text-decoration: none;
            color: #f1f1f1;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            padding: 8px 5px;
            transition: all 0.3s ease-in-out;
            position: relative;
        }

        /* Hover underline effect */
        nav ul li a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #ff0080, #ffcc00, #00ffcc);
            border-radius: 5px;
            transition: width 0.4s ease-in-out;
            box-shadow: 0 0 10px #ffcc00;
        }

        nav ul li a:hover::after,
        nav ul li a.active::after {
            width: 100%;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
        }

        /* Glowing divider bar below nav */
        .glow-divider {
            height: 5px;
            width: 100%;
            background: linear-gradient(90deg, #ff0080, #ffcc00, #00ffcc, #ff0080);
            background-size: 300% 100%;
            animation: moveLight 6s linear infinite;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.7);
        }

        @keyframes moveLight {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Content */
        .content {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <!-- Dynamically add class based on page -->
        <ul class="{% if request.endpoint == 'about' %}center{% else %}left{% endif %}">
            <li><a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a></li>
            <li><a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">About</a></li>
        </ul>
    </nav>

    <!-- glowing bar under nav -->
    <div class="glow-divider"></div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
